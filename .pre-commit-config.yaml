# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: "v6.0.0"
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: "v0.15.22"
    hooks:
      - id: ruff
        types_or: [python, pyi, jupyter]
      - id: ruff-format

  - repo: local
    hooks:
      - id: google-docstring-inline-summaries
        name: Enforce inline Google docstring summaries
        entry: python scripts/check_google_docstring_inline_descriptions.py
        language: python
        pass_filenames: true
        files: ^src/opt/(abstract_optimizer\.py|multi_objective/abstract_multi_objective\.py|(classical|constrained|evolutionary|gradient_based|metaheuristic|multi_objective|physics_inspired|probabilistic|social_inspired|swarm_intelligence)/.*\.py)$
        exclude: ^src/opt/(benchmark|test|__pycache__|visualization)/.*

      # Unified Pydantic-based validator (replaces validate-optimizer-docs)
      - id: unified-docstring-validator
        name: Validate optimizer docstrings (Pydantic schema)
        entry: python scripts/unified_validator.py
        language: python
        pass_filenames: true
        files: ^src/opt/(classical|constrained|evolutionary|gradient_based|metaheuristic|multi_objective|physics_inspired|probabilistic|social_inspired|swarm_intelligence)/.*\.py$
        exclude: ^src/opt/(benchmark|test|__pycache__|visualization|__init__|.*/__init__\.py).*
        additional_dependencies:
          - pydantic>=2.12.5
          - jsonschema>=4.23.0

      # Regenerate the VitePress algorithm docs whenever an optimizer source
      # file, the generator, or the published benchmark data changes. Modifies
      # docs/algorithms/**; re-stage and commit again if it rewrites files
      # (same pattern as ruff-format). Mirrors the docs.yaml CI generation step.
      # Note: intentionally omits --griffe/--full-api. The Griffe API JSON
      # embeds a machine-specific git_info.repository absolute path, so it is
      # non-deterministic across environments and would make this hook never
      # converge. Those files are regenerated fresh in the docs CI build.
      - id: regenerate-optimizer-docs
        name: Regenerate optimizer docs (Markdown + charts + sidebar)
        entry: python scripts/generate_docs.py --all --json --sidebar
        language: system
        pass_filenames: false
        files: ^(src/opt/.*\.py|scripts/generate_docs\.py|docs/public/benchmarks/benchmark-results\.json)$

  # repo-release-tools: fail when a generated artifact drifts from its
  # committed fingerprint (.rrt/artifacts.lock.toml). Refresh the lock after
  # regenerating with:  just docs   (or  rrt artifacts --snapshot ).
  - repo: https://github.com/Anselmoo/repo-release-tools
    rev: v1.14.0
    hooks:
      - id: rrt-artifacts-check
        stages: [pre-push]
      - id: rrt-artifacts-snapshot
        stages: [manual]
