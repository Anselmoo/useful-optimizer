name: Deploy Documentation

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'src/opt/**'
      - '.github/workflows/docs.yaml'
  pull_request:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'src/opt/**'
      - '.github/workflows/docs.yaml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  npm-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: docs/package.json

      - name: Install dependencies (ci)
        working-directory: docs
        run: npm ci

      - name: Check for unresolved dependencies
        working-directory: docs
        run: npm ls --depth=0

  build:
    needs: npm-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: docs/package.json

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install Python dependencies
        run: uv sync --group dev

      - name: Verify generated docs match committed fingerprints
        # Runs through pre-commit so the repo-release-tools version stays pinned
        # in a single place (.pre-commit-config.yaml) rather than duplicated here.
        run: uv run pre-commit run rrt-artifacts-check --hook-stage pre-push --all-files

      - name: Regenerate Griffe API JSON
        run: uv run python scripts/generate_docs.py --all --json --griffe --full-api --sidebar

      - name: Install Node dependencies
        working-directory: docs
        run: npm ci

      - name: Build documentation
        working-directory: docs
        run: npm run docs:build

      - name: Validate documentation migration
        working-directory: docs
        run: npm run validate:migration

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs/.vitepress/dist

  deploy:
    if: github.event_name != 'pull_request'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
